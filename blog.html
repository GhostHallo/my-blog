<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Posts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My Blog</h1>
        <div id="filters">
            <button>All</button>
            <button>Category 1</button>
            <button>Category 2</button>
            <button>Tag 1</button>
            <button>Tag 2</button>
        </div>
    </header>
    <main>
        <section id="posts">
            <article>
                <h2>Post Title 1</h2>
                <p>Category: Category 1</p>
                <p>Tags: Tag 1, Tag 2</p>
                <p>Summary of the blog post...</p>
            </article>
            <article>
                <h2>Post Title 2</h2>
                <p>Category: Category 2</p>
                <p>Tags: Tag 1</p>
                <p>Summary of the blog post...</p>
            </article>
            <!-- Additional posts can be added here -->
        </section>
    </main>
    <footer>
        <p>&copy; 2026 My Blog. All rights reserved.</p>
    </footer>
</body>
</html>
